! =============================================================================
! hq-dist — HQ Distribution Router
! OSPF Area 0 | Loopback 10.255.0.3/32
!
! Uplinks (routed, /30):
!   E0/1 -> core1          10.100.0.6/30
!   E0/2 -> core2          10.100.0.10/30
!
! Trunk links to access (subinterfaces for inter-VLAN routing):
!   E0/3 -> hq-acc1        trunk VLANs 10, 20
!   E1/0 -> hq-acc2        trunk VLANs 30, 40
!
! VLAN subnets (HQ):
!   VLAN 10  clients-acc1  10.10.10.0/24   gw 10.10.10.1
!   VLAN 20  servers-acc1  10.10.20.0/24   gw 10.10.20.1
!   VLAN 30  clients-acc2  10.10.30.0/24   gw 10.10.30.1
!   VLAN 40  servers-acc2  10.10.40.0/24   gw 10.10.40.1
! =============================================================================
!
hostname hq-dist
ip routing
!
interface Loopback0
 ip address 10.255.0.3 255.255.255.255
 ip ospf 1 area 0
!
! --- Uplinks to core ---
interface Ethernet0/1
 description TO-core1
 ip address 10.100.0.6 255.255.255.252
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
interface Ethernet0/2
 description TO-core2
 ip address 10.100.0.10 255.255.255.252
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
! --- Trunk to hq-acc1 (VLANs 10, 20) ---
! Parent interface must be up with no IP
interface Ethernet0/3
 description TRUNK-TO-hq-acc1
 no ip address
 no shutdown
!
interface Ethernet0/3.10
 description VLAN10-HQ-CLIENTS-ACC1
 encapsulation dot1Q 10
 ip address 10.10.10.1 255.255.255.0
 ip ospf 1 area 0
!
interface Ethernet0/3.20
 description VLAN20-HQ-SERVERS-ACC1
 encapsulation dot1Q 20
 ip address 10.10.20.1 255.255.255.0
 ip ospf 1 area 0
!
! --- Trunk to hq-acc2 (VLANs 30, 40) ---
interface Ethernet1/0
 description TRUNK-TO-hq-acc2
 no ip address
 no shutdown
!
interface Ethernet1/0.30
 description VLAN30-HQ-CLIENTS-ACC2
 encapsulation dot1Q 30
 ip address 10.10.30.1 255.255.255.0
 ip ospf 1 area 0
!
interface Ethernet1/0.40
 description VLAN40-HQ-SERVERS-ACC2
 encapsulation dot1Q 40
 ip address 10.10.40.1 255.255.255.0
 ip ospf 1 area 0
!
router ospf 1
 router-id 10.255.0.3
 passive-interface default
 no passive-interface Ethernet0/1
 no passive-interface Ethernet0/2
 no passive-interface Ethernet0/3.10
 no passive-interface Ethernet0/3.20
 no passive-interface Ethernet1/0.30
 no passive-interface Ethernet1/0.40
!
end
