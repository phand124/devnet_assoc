! =============================================================================
! br2-wan — Branch 2 WAN/ABR Router
! OSPF ABR: Area 0 (uplink to core2) + Area 2 (branch side)
! Loopback 10.255.2.1/32
!
! E0/1 -> core2    10.100.2.2/30   Area 0
! E0/2 -> br2-dist 10.100.2.5/30   Area 2
! =============================================================================
!
hostname br2-wan
!
interface Loopback0
 ip address 10.255.2.1 255.255.255.255
 ip ospf 1 area 2
!
interface Ethernet0/1
 description TO-core2-WAN
 ip address 10.100.2.2 255.255.255.252
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
interface Ethernet0/2
 description TO-br2-dist
 ip address 10.100.2.5 255.255.255.252
 ip ospf 1 area 2
 ip ospf network point-to-point
 no shutdown
!
router ospf 1
 router-id 10.255.2.1
 passive-interface default
 no passive-interface Ethernet0/1
 no passive-interface Ethernet0/2
!
end
