! =============================================================================
! br1-acc1 — Branch 1 Access Switch 1  (IOL-L2)
! E0/1 -> br1-dist  trunk VLANs 10,20
! E0/2 -> br1-client1  access VLAN 10
! E0/3 -> br1-server1  access VLAN 20
! =============================================================================
!
hostname br1-acc1
!
vlan 10
 name BR1-CLIENTS-ACC1
!
vlan 20
 name BR1-SERVERS-ACC1
!
interface Ethernet0/1
 description TRUNK-TO-br1-dist
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 10,20
 no shutdown
!
interface Ethernet0/2
 description ACCESS-br1-client1
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown
!
interface Ethernet0/3
 description ACCESS-br1-server1
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 no shutdown
!
end
