! =============================================================================
! core1 — HQ Core Router 1
! OSPF Area 0 | Loopback 10.255.0.1/32
!
! Interfaces:
!   E0/1 -> core2          10.100.0.1/30
!   E0/2 -> hq-dist        10.100.0.5/30
!   E0/3 -> br1-wan        10.100.1.1/30
! =============================================================================
!
hostname core1
!
interface Loopback0
 ip address 10.255.0.1 255.255.255.255
 ip ospf 1 area 0
!
interface Ethernet0/1
 description TO-core2
 ip address 10.100.0.1 255.255.255.252
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
interface Ethernet0/2
 description TO-hq-dist
 ip address 10.100.0.5 255.255.255.252
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
interface Ethernet0/3
 description TO-br1-wan
 ip address 10.100.1.1 255.255.255.252
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
router ospf 1
 router-id 10.255.0.1
 passive-interface default
 no passive-interface Ethernet0/1
 no passive-interface Ethernet0/2
 no passive-interface Ethernet0/3
!
end
