! =============================================================================
! hq-acc1 — HQ Access Switch 1  (IOL-L2)
!
! E0/1 -> hq-dist  (trunk, allowed VLANs 10,20)
! E0/2 -> hq-client1  (access, VLAN 10)
! E0/3 -> hq-server1  (access, VLAN 20)
! =============================================================================
!
hostname hq-acc1
!
vlan 10
 name HQ-CLIENTS-ACC1
!
vlan 20
 name HQ-SERVERS-ACC1
!
! Uplink to distribution — 802.1q trunk
interface Ethernet0/1
 description TRUNK-TO-hq-dist
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 10,20
 no shutdown
!
! Access port — client
interface Ethernet0/2
 description ACCESS-hq-client1
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown
!
! Access port — server
interface Ethernet0/3
 description ACCESS-hq-server1
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 no shutdown
!
end
