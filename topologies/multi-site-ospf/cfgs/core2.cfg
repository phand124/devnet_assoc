! =============================================================================
! core2 — HQ Core Router 2
! OSPF Area 0 | Loopback 10.255.0.2/32
!
! Interfaces:
!   E0/1 -> core1          10.100.0.2/30
!   E0/2 -> hq-dist        10.100.0.9/30
!   E0/3 -> br2-wan        10.100.2.1/30
! =============================================================================
!
hostname core2
!
interface Loopback0
 ip address 10.255.0.2 255.255.255.255
 ip ospf 1 area 0
!
interface Ethernet0/1
 description TO-core1
 ip address 10.100.0.2 255.255.255.252
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
interface Ethernet0/2
 description TO-hq-dist
 ip address 10.100.0.9 255.255.255.252
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
interface Ethernet0/3
 description TO-br2-wan
 ip address 10.100.2.1 255.255.255.252
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
router ospf 1
 router-id 10.255.0.2
 passive-interface default
 no passive-interface Ethernet0/1
 no passive-interface Ethernet0/2
 no passive-interface Ethernet0/3
!
end
