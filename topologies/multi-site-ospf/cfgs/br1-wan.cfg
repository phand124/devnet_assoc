! =============================================================================
! br1-wan — Branch 1 WAN/ABR Router
! OSPF ABR: Area 0 (uplink to core1) + Area 1 (branch side)
! Loopback 10.255.1.1/32
!
! E0/1 -> core1    10.100.1.2/30   Area 0
! E0/2 -> br1-dist 10.100.1.5/30   Area 1
! =============================================================================
!
hostname br1-wan
!
interface Loopback0
 ip address 10.255.1.1 255.255.255.255
 ip ospf 1 area 1
!
interface Ethernet0/1
 description TO-core1-WAN
 ip address 10.100.1.2 255.255.255.252
 ip ospf 1 area 0
 ip ospf network point-to-point
 no shutdown
!
interface Ethernet0/2
 description TO-br1-dist
 ip address 10.100.1.5 255.255.255.252
 ip ospf 1 area 1
 ip ospf network point-to-point
 no shutdown
!
router ospf 1
 router-id 10.255.1.1
 passive-interface default
 no passive-interface Ethernet0/1
 no passive-interface Ethernet0/2
!
end
