! =============================================================================
! br1-dist — Branch 1 Distribution Router
! OSPF Area 1 | Loopback 10.255.1.2/32
!
! E0/1 -> br1-wan   10.100.1.6/30
! E0/2 -> br1-acc1  trunk VLANs 10,20
! E0/3 -> br1-acc2  trunk VLANs 30,40
!
! VLAN subnets (Branch 1):
!   VLAN 10  10.20.10.0/24   gw 10.20.10.1
!   VLAN 20  10.20.20.0/24   gw 10.20.20.1
!   VLAN 30  10.20.30.0/24   gw 10.20.30.1
!   VLAN 40  10.20.40.0/24   gw 10.20.40.1
! =============================================================================
!
hostname br1-dist
ip routing
!
interface Loopback0
 ip address 10.255.1.2 255.255.255.255
 ip ospf 1 area 1
!
interface Ethernet0/1
 description TO-br1-wan
 ip address 10.100.1.6 255.255.255.252
 ip ospf 1 area 1
 ip ospf network point-to-point
 no shutdown
!
interface Ethernet0/2
 description TRUNK-TO-br1-acc1
 no ip address
 no shutdown
!
interface Ethernet0/2.10
 description VLAN10-BR1-CLIENTS-ACC1
 encapsulation dot1Q 10
 ip address 10.20.10.1 255.255.255.0
 ip ospf 1 area 1
!
interface Ethernet0/2.20
 description VLAN20-BR1-SERVERS-ACC1
 encapsulation dot1Q 20
 ip address 10.20.20.1 255.255.255.0
 ip ospf 1 area 1
!
interface Ethernet0/3
 description TRUNK-TO-br1-acc2
 no ip address
 no shutdown
!
interface Ethernet0/3.30
 description VLAN30-BR1-CLIENTS-ACC2
 encapsulation dot1Q 30
 ip address 10.20.30.1 255.255.255.0
 ip ospf 1 area 1
!
interface Ethernet0/3.40
 description VLAN40-BR1-SERVERS-ACC2
 encapsulation dot1Q 40
 ip address 10.20.40.1 255.255.255.0
 ip ospf 1 area 1
!
router ospf 1
 router-id 10.255.1.2
 passive-interface default
 no passive-interface Ethernet0/1
 no passive-interface Ethernet0/2.10
 no passive-interface Ethernet0/2.20
 no passive-interface Ethernet0/3.30
 no passive-interface Ethernet0/3.40
!
end
