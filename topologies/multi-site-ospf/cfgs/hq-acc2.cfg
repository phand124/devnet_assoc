! =============================================================================
! hq-acc2 — HQ Access Switch 2  (IOL-L2)
!
! E0/1 -> hq-dist  (trunk, allowed VLANs 30,40)
! E0/2 -> hq-client2  (access, VLAN 30)
! E0/3 -> hq-server2  (access, VLAN 40)
! =============================================================================
!
hostname hq-acc2
!
vlan 30
 name HQ-CLIENTS-ACC2
!
vlan 40
 name HQ-SERVERS-ACC2
!
interface Ethernet0/1
 description TRUNK-TO-hq-dist
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 30,40
 no shutdown
!
interface Ethernet0/2
 description ACCESS-hq-client2
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast
 no shutdown
!
interface Ethernet0/3
 description ACCESS-hq-server2
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast
 no shutdown
!
end
