! =============================================================================
! br2-dist — Branch 2 Distribution Router
! OSPF Area 2 | Loopback 10.255.2.2/32
!
! VLAN subnets (Branch 2):
!   VLAN 10  10.30.10.0/24   gw 10.30.10.1
!   VLAN 20  10.30.20.0/24   gw 10.30.20.1
!   VLAN 30  10.30.30.0/24   gw 10.30.30.1
!   VLAN 40  10.30.40.0/24   gw 10.30.40.1
! =============================================================================
!
hostname br2-dist
ip routing
!
interface Loopback0
 ip address 10.255.2.2 255.255.255.255
 ip ospf 1 area 2
!
interface Ethernet0/1
 description TO-br2-wan
 ip address 10.100.2.6 255.255.255.252
 ip ospf 1 area 2
 ip ospf network point-to-point
 no shutdown
!
interface Ethernet0/2
 description TRUNK-TO-br2-acc1
 no ip address
 no shutdown
!
interface Ethernet0/2.10
 encapsulation dot1Q 10
 ip address 10.30.10.1 255.255.255.0
 ip ospf 1 area 2
!
interface Ethernet0/2.20
 encapsulation dot1Q 20
 ip address 10.30.20.1 255.255.255.0
 ip ospf 1 area 2
!
interface Ethernet0/3
 description TRUNK-TO-br2-acc2
 no ip address
 no shutdown
!
interface Ethernet0/3.30
 encapsulation dot1Q 30
 ip address 10.30.30.1 255.255.255.0
 ip ospf 1 area 2
!
interface Ethernet0/3.40
 encapsulation dot1Q 40
 ip address 10.30.40.1 255.255.255.0
 ip ospf 1 area 2
!
router ospf 1
 router-id 10.255.2.2
 passive-interface default
 no passive-interface Ethernet0/1
 no passive-interface Ethernet0/2.10
 no passive-interface Ethernet0/2.20
 no passive-interface Ethernet0/3.30
 no passive-interface Ethernet0/3.40
!
end
