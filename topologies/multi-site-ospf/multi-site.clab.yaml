    - endpoints: ["br1-dist:Ethernet0/3", "br1-acc2:Ethernet0/1"]
    - endpoints: ["br1-acc1:Ethernet0/2", "br1-client1:eth1"]
    - endpoints: ["br1-acc1:Ethernet0/3", "br1-serv1:eth1"]
    - endpoints: ["br1-acc2:Ethernet0/2", "br1-client2:eth1"]
    - endpoints: ["br1-acc2:Ethernet0/3", "br1-serv2:eth1"]

    - endpoints: ["br2-wan:Ethernet0/2", "br2-dist:Ethernet0/1"]
    - endpoints: ["br2-dist:Ethernet0/2", "br2-acc1:Ethernet0/1"]
    - endpoints: ["br2-dist:Ethernet0/3", "br2-acc2:Ethernet0/1"]
    - endpoints: ["br2-acc1:Ethernet0/2", "br2-client1:eth1"]
    - endpoints: ["br2-acc1:Ethernet0/3", "br2-serv1:eth1"]
    - endpoints: ["br2-acc2:Ethernet0/2", "br2-client2:eth1"]
    - endpoints: ["br2-acc2:Ethernet0/3", "br2-serv2:eth1"]
