    br2-wan:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.16.01a
      mgmt-ipv4: 192.168.110.31

    br2-dist:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.16.01a
      mgmt-ipv4: 192.168.110.32

    br2-acc1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-17.16.01a
      mgmt-ipv4: 192.168.110.33

    br2-acc2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-17.16.01a
      mgmt-ipv4: 192.168.110.34

    hq-client1:
      kind: linux
      image: alpine:3.19
      mgmt-ipv4: 192.168.110.41

    hq-serv1:
      kind: linux
      image: alpine:3.19
      mgmt-ipv4: 192.168.110.42

    hq-client2:
      kind: linux
      image: alpine:3.19
      mgmt-ipv4: 192.168.110.43

    hq-serv2:
      kind: linux
      image: alpine:3.19
      mgmt-ipv4: 192.168.110.44

    br1-client1:
      kind: linux
      image: alpine:3.19
      mgmt-ipv4: 192.168.110.51

    br1-serv1:
      kind: linux
      image: alpine:3.19
      mgmt-ipv4: 192.168.110.52

    br1-client2:
      kind: linux
      image: alpine:3.19
      mgmt-ipv4: 192.168.110.53

    br1-serv2:
      kind: linux
      image: alpine:3.19
