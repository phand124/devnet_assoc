    - endpoints: ["core1:Ethernet0/2", "hq-dist:Ethernet0/1"]
    - endpoints: ["core2:Ethernet0/2", "hq-dist:Ethernet0/2"]
    - endpoints: ["core1:Ethernet0/3", "br1-wan:Ethernet0/1"]
    - endpoints: ["core2:Ethernet0/3", "br2-wan:Ethernet0/1"]
    - endpoints: ["hq-dist:Ethernet0/3", "hq-acc1:Ethernet0/1"]
    - endpoints: ["hq-dist:Ethernet1/0", "hq-acc2:Ethernet0/1"]
    - endpoints: ["hq-acc1:Ethernet0/2", "hq-client1:eth1"]
