name: multi-site

mgmt:
  network: clab-mgnt
  ipv4-subnet: 192.168.110.0/24

topology:
  defaults:
    kind: cisco_iol

  kinds:
    cisco_iol:
      image: vrnetlab/cisco_iol:17.16.01a

  nodes:
    core1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.16.01a
      mgmt-ipv4: 192.168.110.11

    core2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.16.01a
      mgmt-ipv4: 192.168.110.12

    hq-dist:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.16.01a
      mgmt-ipv4: 192.168.110.13

    hq-acc1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-17.16.01a
      mgmt-ipv4: 192.168.110.14

    hq-acc2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-17.16.01a
      mgmt-ipv4: 192.168.110.15

    br1-wan:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.16.01a
      mgmt-ipv4: 192.168.110.21

    br1-dist:
