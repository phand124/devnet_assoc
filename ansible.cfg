# ansible.cfg — devnet_assoc project
# Scoped to this directory — Ansible reads the nearest ansible.cfg
# in the working directory tree, so per-lab overrides are possible
# by dropping a local ansible.cfg inside a lab directory.

[defaults]

# Inventory — containerlab generates SSH targets at known mgmt IPs.
# Point this at a static file or a dynamic inventory script per lab.
inventory             = ./inventory.yml

# Roles path — add a shared roles dir at the project level
roles_path            = ./roles:~/.ansible/roles

# Collections installed by uv into the venv land here
collections_path      = ./.venv/lib/python3.11/site-packages/ansible_collections:~/.ansible/collections

# SSH settings tuned for IOL nodes
# IOL devices are slow to respond on first connect — raise timeout
timeout               = 30
host_key_checking     = False
# IOL doesn't support pipelining — keep this off
pipelining            = False

# Stdout formatting — readable in neovim terminal splits
stdout_callback       = yaml
callbacks_enabled     = profile_tasks, timer

# Retry files create noise — disable them (they're in .gitignore anyway)
retry_files_enabled   = False

# Logs — useful for debugging failed playbook runs
log_path              = ./ansible.log

# Forks — IOL is CPU-bound per node, don't saturate your cores
# 5 is safe for most lab sizes; bump to 10 for larger topologies
forks                 = 5

# Fact caching — speeds up repeated runs against the same topology
gathering             = smart
fact_caching          = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout  = 3600

# Interpreter — always use the uv-managed venv Python
interpreter_python    = auto_silent

[inventory]

# Silence warnings about ungrouped hosts (common in small lab inventories)
unparsed_is_failed    = False

[ssh_connection]

# SSH multiplexing — dramatically speeds up serial tasks against IOL
# ControlPersist keeps the master socket alive between task runs
ssh_args              = -o ControlMaster=auto -o ControlPersist=300s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

# Retries handle the occasional IOL SSH hiccup on first connect
retries               = 3

# SCP is more reliable than SFTP for IOS-based nodes
transfer_method       = scp

[persistent_connection]

# Network module connections (ios, nxos, etc.) stay open between tasks
# Raise connect_timeout — IOL devices can be slow to reach enable mode
connect_timeout       = 30
command_timeout       = 30
connect_retry_timeout = 15
